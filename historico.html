<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Fornadas</title>
  <style>
    /* Escopo só desta página (mesmo padrão de mockups/historico.html): a
       decisão de `.page` sem max-width (design-system.css, issue 014) é para
       telas com tabela larga (Calculadora/Receitas) — aqui o gráfico SVG
       (viewBox 600×220, trendChart.ts) escala fonte/traço pela largura do
       container (`.chart-svg` não tem width/height no CSS compartilhado —
       só existia no <style> local do mockup, nunca replicado aqui), então um
       container sem limite estica o texto do eixo/rótulos a tamanhos
       absurdos. Restaura o limite do canônico (2026-07-06, bug relatado).
       `padding`/`display`/`gap` continuam vindo do `.page` compartilhado —
       só o que falta é adicionado aqui, sem duplicar. */
    .page { max-width: 1080px; margin: 0 auto; }
    .chart-svg { width: 100%; height: auto; overflow: visible; }
  </style>
</head>
<body>
  <!-- Navegação global (espelha mockups/*.html) — Histórico é a página ativa. -->
  <nav class="app-nav">
    <a href="receitas.html">Calculadora</a>
    <a href="index.html">Receitas</a>
    <a href="historico.html" class="active">Histórico</a>
  </nav>

  <!-- Cabeçalho de página padrão (design-system.css .page-header, spec §14).
       O <h1> estático é preenchido por historico.ts; filtros/KPIs/gráfico/
       tabela (issue 018) são responsabilidade de `renderHistoryView`,
       montados dentro de #app. -->
  <header class="page-header">
    <div class="inner" id="hist-header"></div>
  </header>

  <!-- Ponto de montagem da UI (issue 018): dashboard via historyView.ts. -->
  <div id="app" class="page"></div>

  <script type="module" src="/src/ui/pages/historico.ts"></script>
</body>
</html>
