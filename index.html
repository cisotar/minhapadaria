<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Receitas</title>
</head>
<body>
  <!-- Inversão nome↔conteúdo (issue 032, spec.md refactor I): GitHub Pages
       serve `index.html` como documento default da raiz — para a raiz exibir
       "Minhas Receitas" sem trocar a URL publicada, este arquivo (nome
       `index.html`) passou a hospedar o shell de Receitas; o shell da
       Calculadora foi movido para `receitas.html` (ver comentário espelhado
       lá). Nenhuma lógica de `receitas.ts` mudou — só o roteamento/shell. -->

  <!-- Navegação global (espelha mockups/*.html) — Receitas é a página ativa. -->
  <nav class="app-nav">
    <a href="receitas.html">Calculadora</a>
    <a href="index.html" class="active">Receitas</a>
    <a href="historico.html">Histórico</a>
  </nav>

  <!-- Cabeçalho de página padrão (design-system.css .page-header, spec §2.F).
       O <h1> estático é preenchido por receitas.ts; a barra de ações
       (busca/criar/backup) e o subtítulo dinâmico são responsabilidade de
       `renderRecipesList` (issue 017), montados dentro de #app. -->
  <header class="page-header">
    <div class="inner" id="rc-header"></div>
  </header>

  <!-- Ponto de montagem da UI (issue 017): grid de receitas via recipesList.ts. -->
  <div id="app" class="page"></div>

  <script type="module" src="/src/ui/pages/receitas.ts"></script>
</body>
</html>
